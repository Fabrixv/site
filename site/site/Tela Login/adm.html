<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel do Admin</title>
  <link rel="stylesheet" href="adm.css">
</head>
<body>

  <h1>Painel do Administrador</h1>
  <h2>Usuários cadastrados no sistema</h2>


<section id="alter_user">
</div>
</header>
<div class="box">
  <h2>Minha Conta</h2>
  <input id="id" type="number" placeholder="Id">
  <input id="nome" placeholder="Nome">
  <input id="sobrenome" placeholder="Sobrenome">
  <input id="email" placeholder="Email">
  <input id="user" placeholder="Usuário">

<div class="senha-container">
  <input id="pass" type="password" placeholder="Senha">
  <label>
    <input type="checkbox" id="showPass"> Mostrar senha
  </label>
</div>
  <button class="buscar" id="buscar" onclick="buscarUserEdicao()">Buscar</button>
  <button class="ok" id="salvar">Salvar Alterações</button>
  <button id="logoutBtn" onclick="logout()">Sair</button>
  <button class="danger" id="deletar">Deletar Conta</button>
  
</section>
<button onclick="carregarUsuarios()">Carregar Usuários</button>

<table id="usersTable">
    <thead>
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Sobrenome</th>
            <th>Usuário</th>
            <th>Senha</th>
            <th>Data de Nascimento</th>
        </tr>
    </thead>
    <tbody>
    </tbody>
</table>

  <script src="adm.js"></script>
</body>
</html>
