<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>login</title>
  <link rel="stylesheet" href="telalog.css">
</head>
<body>

  <canvas id="particles"></canvas>

  <main class="wrap" role="main" aria-labelledby="mainTitle">
    <div class="card">
      <h1 id="mainTitle">Entrar</h1>

      <!-- ================= LOGIN ================= -->
      <section id="loginView" class="view">
        <label class="label">Usuário
          <input id="loginUser" type="text" placeholder="Seu usuário" />
        </label>

        <label class="label">Senha
          <div class="field-with-btn">
            <input id="loginPass" type="password" placeholder="Sua senha" />
            <button class="showBtn" type="button" onclick="toggleSenha('loginPass', this)">👁</button>
          </div>
        </label>

        <button class="action" id="btnLogin">Entrar</button>

        <p class="switch" id="toForgot">Esqueceu a senha?</p>
        <p class="switch" id="toCreate">Criar conta →</p>
      </section>

      <!-- ================= CRIAR CONTA ================= -->
      <section id="createView" class="view" style="display:none;">
        <h2 class="sub">Criar Conta</h2>

        <label class="label">Nome
          <input id="newNome" type="text" placeholder="Seu nome" />
        </label>

        <label class="label">Sobrenome
          <input id="newSobrenome" type="text" placeholder="Seu sobrenome" />
        </label>

        <label class="label">Data de nascimento
          <input id="newNascimento" type="date" />
        </label>

        <label class="label">E-mail
          <input id="newEmail" type="email" placeholder="Seu e-mail" />
        </label>

        <label class="label">Usuário
          <input id="newUser" type="text" placeholder="Escolha um usuário" />
        </label>

        <label class="label">Senha
          <div class="field-with-btn">
            <input id="newPass" type="password" placeholder="Crie uma senha" />
            <button class="showBtn" type="button" onclick="toggleSenha('newPass', this)">👁</button>
          </div>
        </label>

        <button class="action" id="btnCreate">Criar conta</button>

        <p class="switch" id="toLogin">← Já tenho conta</p>
      </section>

      <!-- ================= ESQUECEU A SENHA ================= -->
      <section id="forgotView" class="view" style="display:none;">
        <h2 class="sub">Recuperar senha</h2>

        <label class="label">E-mail cadastrado
          <input id="recoverEmail" type="email" placeholder="Digite seu e-mail" />
        </label>

        <button class="action" id="btnRecover">Enviar</button>

        <p class="switch" id="backLogin">← Voltar ao login</p>
      </section>

    </div>
  </main>

  <script>
/* ---------------- Partículas ---------------- */
(function(){
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = innerWidth;
    canvas.height = innerHeight;
  }
  window.addEventListener('resize', resize, {passive:true});
  resize();

  const particles = [];
  const COUNT = Math.round(window.innerWidth / 12);

  for (let i = 0; i < COUNT; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: 0.8 + Math.random() * 1.8,
      v: 0.6 + Math.random() * 2
    });
  }

  function frame(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fill();
      p.y += p.v;
      if (p.y > canvas.height + 10) {
        p.y = -10;
        p.x = Math.random() * canvas.width;
      }
    });
    requestAnimationFrame(frame);
  }
  frame();
})();

/* ---------------- Seletores ---------------- */
const loginView = document.getElementById('loginView');
const createView = document.getElementById('createView');
const forgotView = document.getElementById('forgotView');

document.getElementById('toCreate').onclick = () => showView('create');
document.getElementById('toLogin').onclick = () => showView('login');
document.getElementById('toForgot').onclick = () => showView('forgot');
document.getElementById('backLogin').onclick = () => showView('login');

function showView(view) {
  loginView.style.display = 'none';
  createView.style.display = 'none';
  forgotView.style.display = 'none';

  if (view === 'login') {
    loginView.style.display = 'block';
    document.getElementById('mainTitle').textContent = 'Entrar';
  } else if (view === 'create') {
    createView.style.display = 'block';
    document.getElementById('mainTitle').textContent = 'Criar Conta';
  } else if (view === 'forgot') {
    forgotView.style.display = 'block';
    document.getElementById('mainTitle').textContent = 'Recuperar Senha';
  }
}

/* ---------------- Mostrar senha ---------------- */
function toggleSenha(id, btn) {
  const input = document.getElementById(id);
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = '🙈';
  } else {
    input.type = 'password';
    btn.textContent = '🙉';
  }
}

/* ---------------- Criar conta ---------------- */
document.getElementById('btnCreate').addEventListener('click', () => {

  const data = {
    nome:        document.getElementById('newNome').value.trim(),
    sobrenome:   document.getElementById('newSobrenome').value.trim(),
    nascimento:  document.getElementById('newNascimento').value,
    email:       document.getElementById('newEmail').value.trim(),
    user:        document.getElementById('newUser').value.trim(),
    pass:        document.getElementById('newPass').value
  };

  if (!data.nome || !data.sobrenome || !data.nascimento || !data.email || !data.user || !data.pass) {
    alert("Preencha todos os campos!");
    return;
  }

  // Armazena como JSON
  localStorage.setItem('app_account', JSON.stringify(data));

  alert('Conta criada com sucesso!');
  showView('login');
});

/* ---------------- Login ---------------- */
document.getElementById('btnLogin').addEventListener('click', () => {
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value;

  const acc = JSON.parse(localStorage.getItem('app_account') || '{}');

  if (user === acc.user && pass === acc.pass) {
    alert("Login bem-sucedido!");
    location.href = "Alogin.html";
  } else {
    alert("Usuário ou senha incorretos!");
  }
});

/* ---------------- Recuperar senha ---------------- */
document.getElementById('btnRecover').addEventListener('click', () => {
  const emailTry = document.getElementById('recoverEmail').value.trim();
  const acc = JSON.parse(localStorage.getItem('app_account') || '{}');

  if (emailTry === acc.email) {
    alert("Sua senha é: " + acc.pass);
    showView('login');
  } else {
    alert("E-mail não encontrado!");
  }
});
 
 </script>

</body>
</html>
